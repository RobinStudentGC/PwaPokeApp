<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="msapplication-TileColor" content="#3B4CCA" />
    <meta name="description" content="A simple Pokemon app" />
    <meta name="theme-color" content="#3B4CCA" />
    <link rel="icon" href="/PwaPokeApp/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/PwaPokeApp/icon512_rounded.png"
    />
    <link rel="manifest" href="/PwaPokeApp/manifest.json" />
    <title>PokeApp</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
          try {
            await navigator.serviceWorker.register(
              "/PwaPokeApp/service-worker.js",
            );
            console.log("Service Worker registered");
          } catch (error) {
            console.error("Service Worker registration failed:", error);
          }
        });
      }

      let deferredPrompt;

      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById("install-btn").style.display = "block";
      });

      window.addEventListener("load", () => {
        document
          .getElementById("install-btn")
          .addEventListener("click", async () => {
            if (deferredPrompt) {
              deferredPrompt.prompt();
              const { outcome } = await deferredPrompt.userChoice;
              deferredPrompt = null;
              document.getElementById("install-btn").style.display = "none";
            }
          });
      });
    </script>
    <style>
      body {
        margin: 0;
        font-family: "Roboto", sans-serif;
      }
      :root {
        --mdc-theme-primary: #3b4cca;
        --mdc-theme-secondary: #2a75bb;
        --mdc-theme-background: #f5f5f5;
      }
    </style>
    <script type="module" crossorigin src="/PwaPokeApp/assets/index-D8IXXjXr.js"></script>
    <link rel="stylesheet" crossorigin href="/PwaPokeApp/assets/index-CcfP1pyi.css">
  </head>
  <body>
    <div id="app"></div>
    <button
      id="install-btn"
      style="
        display: none;
        position: fixed;
        bottom: 80px;
        transform: translateX(-50%);
        z-index: 999;
        padding: 12px 20px;
        background: #3b4cca;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
      "
    >
      Installeer App
    </button>
  </body>
</html>
